name: Build

on:
  push:
    branches: 
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        apt update
        apt install -y libapt-pkg-dev
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
